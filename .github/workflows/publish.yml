name: Publish to PyPI

# Build and publish the package to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token needs to be stored.
# Configure the trusted publisher once at:
#   https://pypi.org/manage/project/pyworkforce/settings/publishing/
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check distributions
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pyworkforce/
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
