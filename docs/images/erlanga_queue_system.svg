<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 260"
     font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#475569"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#ef4444"/>
    </marker>
    <radialGradient id="callerGrad" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </radialGradient>
    <radialGradient id="agentGrad" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </radialGradient>
  </defs>

  <!-- Canvas background -->
  <rect width="780" height="260" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ────────────────────────────────────────────────────────────────
       ARRIVAL SOURCE
  ──────────────────────────────────────────────────────────────────── -->
  <circle cx="76" cy="128" r="44" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <circle cx="76" cy="128" r="32" fill="url(#callerGrad)"/>
  <circle cx="76" cy="120" r="9"  fill="white" opacity="0.9"/>
  <path d="M 58 141 Q 76 130 94 141"
        stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  <text x="76" y="191" text-anchor="middle" fill="#475569"
        font-size="11.5" font-weight="600">Arrival rate</text>
  <text x="76" y="206" text-anchor="middle" fill="#64748b" font-size="12">(λ)</text>

  <!-- ────────────────────────────────────────────────────────────────
       ARRIVALS ARROW
  ──────────────────────────────────────────────────────────────────── -->
  <line x1="123" y1="128" x2="198" y2="128"
        stroke="#475569" stroke-width="2.2" marker-end="url(#arr)"/>
  <text x="160" y="117" text-anchor="middle" fill="#64748b" font-size="11">Arrivals</text>

  <!-- ────────────────────────────────────────────────────────────────
       QUEUE
  ──────────────────────────────────────────────────────────────────── -->
  <rect x="203" y="103" width="230" height="50" rx="5"
        fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="249" y1="103" x2="249" y2="153" stroke="#93c5fd" stroke-width="1"/>
  <line x1="295" y1="103" x2="295" y2="153" stroke="#93c5fd" stroke-width="1"/>
  <line x1="341" y1="103" x2="341" y2="153" stroke="#93c5fd" stroke-width="1"/>
  <line x1="387" y1="103" x2="387" y2="153" stroke="#93c5fd" stroke-width="1"/>
  <!-- callers in cells 1-3 -->
  <circle cx="226" cy="124" r="5.5" fill="#3b82f6" opacity="0.45"/>
  <path d="M 220 132 Q 226 128 232 132"
        stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.45"/>
  <circle cx="272" cy="124" r="5.5" fill="#3b82f6" opacity="0.45"/>
  <path d="M 266 132 Q 272 128 278 132"
        stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.45"/>
  <circle cx="318" cy="124" r="5.5" fill="#3b82f6" opacity="0.45"/>
  <path d="M 312 132 Q 318 128 324 132"
        stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.45"/>
  <text x="318" y="178" text-anchor="middle" fill="#475569"
        font-size="11.5" font-weight="600">Queue</text>

  <!-- ────────────────────────────────────────────────────────────────
       ABANDONMENT ARROW  (dashed, curves upward from queue center)
  ──────────────────────────────────────────────────────────────────── -->
  <!-- curved dashed path leaving from top of queue -->
  <path d="M 318 103 Q 318 62 368 50"
        stroke="#ef4444" stroke-width="1.8" fill="none"
        stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <!-- abandonment label -->
  <text x="370" y="44" fill="#ef4444" font-size="11" font-weight="600">Abandonment</text>
  <!-- patience label -->
  <text x="370" y="57" fill="#ef4444" font-size="10">patience rate (θ)</text>

  <!-- ────────────────────────────────────────────────────────────────
       QUEUE → RESOURCES ARROW
  ──────────────────────────────────────────────────────────────────── -->
  <line x1="436" y1="128" x2="508" y2="128"
        stroke="#475569" stroke-width="2.2" marker-end="url(#arr)"/>

  <!-- ────────────────────────────────────────────────────────────────
       RESOURCES
  ──────────────────────────────────────────────────────────────────── -->
  <text x="578" y="70" text-anchor="middle" fill="#475569"
        font-size="11.5" font-weight="600">Resources (c)</text>
  <rect x="515" y="78" width="126" height="100" rx="8"
        fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5"/>
  <!-- agent 1 -->
  <circle cx="578" cy="100" r="17" fill="url(#agentGrad)"/>
  <circle cx="578" cy="94"  r="6"  fill="white" opacity="0.85"/>
  <path d="M 566 107 Q 578 101 590 107"
        stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- agent 2 -->
  <circle cx="578" cy="128" r="17" fill="url(#agentGrad)"/>
  <circle cx="578" cy="122" r="6"  fill="white" opacity="0.85"/>
  <path d="M 566 135 Q 578 129 590 135"
        stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- agent 3 -->
  <circle cx="578" cy="156" r="17" fill="url(#agentGrad)"/>
  <circle cx="578" cy="150" r="6"  fill="white" opacity="0.85"/>
  <path d="M 566 163 Q 578 157 590 163"
        stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- ────────────────────────────────────────────────────────────────
       EXIT ARROW
  ──────────────────────────────────────────────────────────────────── -->
  <line x1="644" y1="128" x2="718" y2="128"
        stroke="#475569" stroke-width="2.2" marker-end="url(#arr)"/>
  <text x="681" y="117" text-anchor="middle" fill="#64748b" font-size="11">Exit</text>

  <!-- ────────────────────────────────────────────────────────────────
       ASA BRACE
  ──────────────────────────────────────────────────────────────────── -->
  <line x1="123" y1="87"  x2="123" y2="80"  stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="123" y1="80"  x2="514" y2="80"  stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="514" y1="87"  x2="514" y2="80"  stroke="#94a3b8" stroke-width="1.5"/>
  <text x="318" y="71" text-anchor="middle" fill="#64748b" font-size="11.5">
    Average speed of answer (ASA)
  </text>

  <!-- ────────────────────────────────────────────────────────────────
       AHT BRACE
  ──────────────────────────────────────────────────────────────────── -->
  <line x1="515" y1="182" x2="515" y2="190" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="515" y1="190" x2="641" y2="190" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="641" y1="182" x2="641" y2="190" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="578" y="204" text-anchor="middle" fill="#64748b" font-size="11.5">
    Average handle time
  </text>
</svg>
