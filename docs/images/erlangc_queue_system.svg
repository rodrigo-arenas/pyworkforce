<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 240"
     font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#475569"/>
    </marker>
    <radialGradient id="callerGrad" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </radialGradient>
    <radialGradient id="agentGrad" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </radialGradient>
  </defs>

  <!-- Canvas background -->
  <rect width="780" height="240" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ────────────────────────────────────────────────────────────────
       ARRIVAL SOURCE
  ──────────────────────────────────────────────────────────────────── -->
  <!-- outer glow ring -->
  <circle cx="76" cy="118" r="44" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- main circle -->
  <circle cx="76" cy="118" r="32" fill="url(#callerGrad)"/>
  <!-- person icon (white) -->
  <circle cx="76" cy="110" r="9"  fill="white" opacity="0.9"/>
  <path d="M 58 131 Q 76 120 94 131"
        stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- labels -->
  <text x="76" y="181" text-anchor="middle" fill="#475569"
        font-size="11.5" font-weight="600">Arrival rate</text>
  <text x="76" y="196" text-anchor="middle" fill="#64748b" font-size="12">(λ)</text>

  <!-- ────────────────────────────────────────────────────────────────
       ARRIVALS ARROW
  ──────────────────────────────────────────────────────────────────── -->
  <line x1="123" y1="118" x2="198" y2="118"
        stroke="#475569" stroke-width="2.2" marker-end="url(#arr)"/>
  <text x="160" y="107" text-anchor="middle" fill="#64748b" font-size="11">Arrivals</text>

  <!-- ────────────────────────────────────────────────────────────────
       QUEUE
  ──────────────────────────────────────────────────────────────────── -->
  <rect x="203" y="93" width="230" height="50" rx="5"
        fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- cell dividers -->
  <line x1="249" y1="93"  x2="249" y2="143" stroke="#93c5fd" stroke-width="1"/>
  <line x1="295" y1="93"  x2="295" y2="143" stroke="#93c5fd" stroke-width="1"/>
  <line x1="341" y1="93"  x2="341" y2="143" stroke="#93c5fd" stroke-width="1"/>
  <line x1="387" y1="93"  x2="387" y2="143" stroke="#93c5fd" stroke-width="1"/>
  <!-- callers waiting in first 3 cells -->
  <circle cx="226" cy="114" r="5.5" fill="#3b82f6" opacity="0.45"/>
  <path d="M 220 122 Q 226 118 232 122"
        stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.45"/>
  <circle cx="272" cy="114" r="5.5" fill="#3b82f6" opacity="0.45"/>
  <path d="M 266 122 Q 272 118 278 122"
        stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.45"/>
  <circle cx="318" cy="114" r="5.5" fill="#3b82f6" opacity="0.45"/>
  <path d="M 312 122 Q 318 118 324 122"
        stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.45"/>
  <!-- queue label -->
  <text x="318" y="168" text-anchor="middle" fill="#475569"
        font-size="11.5" font-weight="600">Queue</text>

  <!-- ────────────────────────────────────────────────────────────────
       QUEUE → RESOURCES ARROW
  ──────────────────────────────────────────────────────────────────── -->
  <line x1="436" y1="118" x2="508" y2="118"
        stroke="#475569" stroke-width="2.2" marker-end="url(#arr)"/>

  <!-- ────────────────────────────────────────────────────────────────
       RESOURCES
  ──────────────────────────────────────────────────────────────────── -->
  <text x="578" y="60" text-anchor="middle" fill="#475569"
        font-size="11.5" font-weight="600">Resources (c)</text>
  <rect x="515" y="68" width="126" height="100" rx="8"
        fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5"/>
  <!-- agent 1 -->
  <circle cx="578" cy="90"  r="17" fill="url(#agentGrad)"/>
  <circle cx="578" cy="84"  r="6"  fill="white" opacity="0.85"/>
  <path d="M 566 97 Q 578 91 590 97"
        stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- agent 2 -->
  <circle cx="578" cy="118" r="17" fill="url(#agentGrad)"/>
  <circle cx="578" cy="112" r="6"  fill="white" opacity="0.85"/>
  <path d="M 566 125 Q 578 119 590 125"
        stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- agent 3 -->
  <circle cx="578" cy="146" r="17" fill="url(#agentGrad)"/>
  <circle cx="578" cy="140" r="6"  fill="white" opacity="0.85"/>
  <path d="M 566 153 Q 578 147 590 153"
        stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- ────────────────────────────────────────────────────────────────
       EXIT ARROW
  ──────────────────────────────────────────────────────────────────── -->
  <line x1="644" y1="118" x2="718" y2="118"
        stroke="#475569" stroke-width="2.2" marker-end="url(#arr)"/>
  <text x="681" y="107" text-anchor="middle" fill="#64748b" font-size="11">Exit</text>

  <!-- ────────────────────────────────────────────────────────────────
       ASA BRACE — arrival arrow start → left edge of resources
       (= queue wait time until answered)
  ──────────────────────────────────────────────────────────────────── -->
  <line x1="123" y1="77" x2="123" y2="70" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="123" y1="70" x2="514" y2="70" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="514" y1="70" x2="514" y2="77" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="318" y="61" text-anchor="middle" fill="#64748b" font-size="11.5">
    Average speed of answer (ASA)
  </text>

  <!-- ────────────────────────────────────────────────────────────────
       AHT BRACE — resources box
  ──────────────────────────────────────────────────────────────────── -->
  <line x1="515" y1="172" x2="515" y2="180" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="515" y1="180" x2="641" y2="180" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="641" y1="172" x2="641" y2="180" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="578" y="194" text-anchor="middle" fill="#64748b" font-size="11.5">
    Average handle time
  </text>
</svg>
