<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 250"
     font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#475569"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#ef4444"/>
    </marker>
    <radialGradient id="callerGrad" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </radialGradient>
    <radialGradient id="agentGrad" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </radialGradient>
  </defs>

  <!-- Canvas background -->
  <rect width="780" height="250" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ────────────────────────────────────────────────────────────────
       ARRIVAL SOURCE
  ──────────────────────────────────────────────────────────────────── -->
  <circle cx="76" cy="110" r="44" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <circle cx="76" cy="110" r="32" fill="url(#callerGrad)"/>
  <circle cx="76" cy="102" r="9"  fill="white" opacity="0.9"/>
  <path d="M 58 123 Q 76 112 94 123"
        stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  <text x="76" y="173" text-anchor="middle" fill="#475569"
        font-size="11.5" font-weight="600">Arrival rate</text>
  <text x="76" y="188" text-anchor="middle" fill="#64748b" font-size="12">(λ)</text>

  <!-- ────────────────────────────────────────────────────────────────
       "NO QUEUE" ZONE — long arrow direct to channels
  ──────────────────────────────────────────────────────────────────── -->
  <line x1="123" y1="110" x2="424" y2="110"
        stroke="#475569" stroke-width="2.2" marker-end="url(#arr)"/>
  <!-- "No waiting room" pill label -->
  <rect x="193" y="81" width="140" height="20" rx="10"
        fill="#fef9c3" stroke="#fde047" stroke-width="1"/>
  <text x="263" y="95" text-anchor="middle" fill="#854d0e"
        font-size="10" font-weight="600">No waiting room</text>

  <!-- ────────────────────────────────────────────────────────────────
       CHANNELS (RESOURCES)
  ──────────────────────────────────────────────────────────────────── -->
  <text x="542" y="52" text-anchor="middle" fill="#475569"
        font-size="11.5" font-weight="600">Channels (c)</text>
  <rect x="430" y="60" width="224" height="100" rx="8"
        fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5"/>

  <!-- channel 1 (serving) -->
  <circle cx="490" cy="110" r="17" fill="url(#agentGrad)"/>
  <circle cx="490" cy="104" r="6"  fill="white" opacity="0.85"/>
  <path d="M 478 117 Q 490 111 502 117"
        stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- channel 2 (serving) -->
  <circle cx="542" cy="110" r="17" fill="url(#agentGrad)"/>
  <circle cx="542" cy="104" r="6"  fill="white" opacity="0.85"/>
  <path d="M 530 117 Q 542 111 554 117"
        stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- channel 3 (busy — shown with red tint) -->
  <circle cx="594" cy="110" r="17" fill="#dc2626" opacity="0.75"/>
  <circle cx="594" cy="104" r="6"  fill="white" opacity="0.85"/>
  <path d="M 582 117 Q 594 111 606 117"
        stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- "busy" badge -->
  <circle cx="606" cy="96" r="7" fill="#dc2626"/>
  <text x="606" y="99.5" text-anchor="middle" fill="white" font-size="8" font-weight="700">!</text>

  <!-- ────────────────────────────────────────────────────────────────
       BLOCKED BRANCH  (dashed red, exits right-side of channels box)
       Shows what happens when ALL channels are busy
  ──────────────────────────────────────────────────────────────────── -->
  <!-- down-and-right blocked arrow from bottom-right of channels box -->
  <path d="M 594 162 Q 594 200 650 210"
        stroke="#ef4444" stroke-width="1.8" fill="none"
        stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <!-- blocked indicator box -->
  <rect x="648" y="208" width="102" height="26" rx="6"
        fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <!-- X circle -->
  <circle cx="664" cy="221" r="8" fill="#dc2626"/>
  <line x1="660" y1="217" x2="668" y2="225" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="668" y1="217" x2="660" y2="225" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <text x="700" y="225" text-anchor="middle" fill="#dc2626"
        font-size="11" font-weight="600">Blocked</text>
  <!-- blocking probability label -->
  <text x="650" y="246" fill="#ef4444" font-size="10">Blocking prob. B(c, A)</text>

  <!-- ────────────────────────────────────────────────────────────────
       EXIT ARROW (served calls)
  ──────────────────────────────────────────────────────────────────── -->
  <line x1="657" y1="110" x2="725" y2="110"
        stroke="#475569" stroke-width="2.2" marker-end="url(#arr)"/>
  <text x="691" y="99" text-anchor="middle" fill="#64748b" font-size="11">Exit</text>

  <!-- ────────────────────────────────────────────────────────────────
       AHT BRACE
  ──────────────────────────────────────────────────────────────────── -->
  <line x1="430" y1="164" x2="430" y2="172" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="430" y1="172" x2="654" y2="172" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="654" y1="164" x2="654" y2="172" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="542" y="186" text-anchor="middle" fill="#64748b" font-size="11.5">
    Average holding time (AHT)
  </text>
</svg>
